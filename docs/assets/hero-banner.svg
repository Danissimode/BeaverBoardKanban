<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1000" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .background { fill: #09090B; }
      .text-title { font-family: Arial, sans-serif; font-size: 48px; font-weight: bold; fill: #FFFFFF; }
      .text-tagline { font-family: Arial, sans-serif; font-size: 24px; fill: #9CA3AF; }
      .text-kanban-header { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #FFFFFF; }
      .text-card-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .text-card-desc { font-family: Arial, sans-serif; font-size: 12px; fill: #D1D5DB; }
      .text-mockup-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #FFFFFF; }
      .text-mockup-kanban-header { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .text-mockup-card-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #FFFFFF; }
      .text-mockup-card-desc { font-family: Arial, sans-serif; font-size: 10px; fill: #D1D5DB; }
      .text-chat-header { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .text-chat-message { font-family: Arial, sans-serif; font-size: 10px; fill: #D1D5DB; }
      .text-chat-message-agent { font-family: Arial, sans-serif; font-size: 10px; fill: #FFFFFF; }
      .beaver { fill: #4B5563; }
      .beaver-accent { fill: #F97316; }
      .kanban-board { fill: #1F2937; }
      .kanban-card { fill: #374151; }
      .ui-mockup { fill: #111827; stroke: #374151; stroke-width: 1; }
      .chat-message-dev { fill: #374151; }
      .chat-message-agent { fill: #F97316; }
      .glow { filter: url(#glow); }
    </style>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect class="background" width="1000" height="500"/>

  <!-- Title and Tagline -->
  <text class="text-title" x="40" y="80">Beaver Board Kanban</text>
  <text class="text-tagline" x="40" y="120">Run your AI team from one board.</text>

  <!-- Beaver Mascot -->
  <ellipse class="beaver" cx="150" cy="180" rx="30" ry="30"/>
  <ellipse class="beaver-accent" cx="140" cy="170" rx="7" ry="10"/>
  <ellipse class="beaver-accent" cx="160" cy="170" rx="7" ry="10"/>
  <ellipse class="beaver" cx="165" cy="185" rx="5" ry="3"/>
  <circle class="beaver" cx="155" cy="175" r="4"/>

  <!-- Kanban Board -->
  <rect class="kanban-board" x="40" y="220" width="200" height="200" rx="8"/>
  <text class="text-kanban-header" x="50" y="250">In Progress</text>
  <rect class="kanban-card" x="50" y="270" width="180" height="60" rx="4"/>
  <text class="text-card-title" x="60" y="290">BB-102</text>
  <text class="text-card-desc" x="60" y="310">Refactor Auth Layer</text>

  <!-- Floating UI Mockup -->
  <rect class="ui-mockup" x="400" y="80" width="520" height="350" rx="12"/>
  <text class="text-mockup-title" x="420" y="120">Beaver Board Kanban</text>

  <!-- Kanban Column in Mockup -->
  <rect class="kanban-board" x="420" y="150" width="480" height="120" rx="8"/>
  <text class="text-mockup-kanban-header" x="430" y="180">In Progress</text>
  <rect class="kanban-card" x="430" y="200" width="460" height="40" rx="4"/>
  <text class="text-mockup-card-title" x="440" y="220">BB-102</text>
  <text class="text-mockup-card-desc" x="440" y="235">Refactor Auth Layer</text>

  <!-- Chat Panel in Mockup -->
  <rect class="kanban-board" x="420" y="290" width="480" height="100" rx="8"/>
  <text class="text-chat-header" x="430" y="320">Chat</text>
  <rect class="chat-message-dev" x="430" y="340" width="460" height="20" rx="4"/>
  <text class="text-chat-message" x="440" y="355">Developer: @agent, prioritize auth refactor</text>
  <rect class="chat-message-agent" x="430" y="370" width="460" height="20" rx="4"/>
  <text class="text-chat-message-agent" x="440" y="385">Agent: Understood! Starting now.</text>
</svg>