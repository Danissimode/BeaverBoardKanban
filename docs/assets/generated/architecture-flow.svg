    <text x="110" y="230" font-family="JetBrains Mono, monospace" font-size="10" fill="#71717A" text-anchor="middle">Working on BB-102</text>
    
    <!-- Chat bubble -->
    <rect x="20" y="250" width="180" height="50" rx="8" fill="#27272A" stroke="#3F3F46" stroke-width="0.5"/>
    <text x="30" y="270" font-family="Inter, sans-serif" font-size="10" fill="#A1A1AA">💬 "Found 3 legacy refs to</text>
    <text x="30" y="285" font-family="Inter, sans-serif" font-size="10" fill="#A1A1AA">JWT library. Updating..."</text>
  </g>
  
  <!-- ARROW 2 -->
  <g transform="translate(710, 200)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#F97316" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="8,5"/>
    <text x="40" y="-12" font-family="JetBrains Mono, monospace" font-size="11" fill="#F97316" text-anchor="middle">execute</text>
  </g>
  
  <!-- TERMINAL -->
  <g transform="translate(810, 90)">
    <rect x="0" y="0" width="340" height="320" rx="14" fill="#111113" stroke="#3F3F46" stroke-width="1.5"/>
    <text x="170" y="32" font-family="JetBrains Mono, monospace" font-size="13" fill="#71717A" text-anchor="middle" font-weight="500">OPENCODE</text>
    
    <!-- Terminal window -->
    <rect x="15" y="50" width="310" height="210" rx="8" fill="#09090B" stroke="#3F3F46" stroke-width="1"/>
    
    <!-- Terminal header -->
    <rect x="15" y="50" width="310" height="28" rx="8" fill="#18181B"/>
    <rect x="15" y="68" width="310" height="10" fill="#18181B"/>
    <circle cx="32" cy="64" r="5" fill="#F06B6B"/>
    <circle cx="48" cy="64" r="5" fill="#F59E0B"/>
    <circle cx="64" cy="64" r="5" fill="#3ECF8E"/>
    <text x="170" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#71717A" text-anchor="middle">claude-code — BB-102</text>
    
    <!-- Terminal content -->
    <text x="28" y="98" font-family="JetBrains Mono, monospace" font-size="10" fill="#71717A">$ Analyzing repository context...</text>
    <text x="28" y="115" font-family="JetBrains Mono, monospace" font-size="10" fill="#A1A1AA">  Found 4 references to JWT library</text>
    <text x="28" y="132" font-family="JetBrains Mono, monospace" font-size="10" fill="#3ECF8E">  ✓ Updated src/middleware/auth.ts</text>
    <text x="28" y="149" font-family="JetBrains Mono, monospace" font-size="10" fill="#3ECF8E">  ✓ Updated types/auth.d.ts</text>
    <text x="28" y="166" font-family="JetBrains Mono, monospace" font-size="10" fill="#F59E0B">  ⚠ Type mismatch — auto-fixing...</text>
    <text x="28" y="183" font-family="JetBrains Mono, monospace" font-size="10" fill="#3ECF8E">  ✓ All tests passed (12/12)</text>
    <text x="28" y="200" font-family="JetBrains Mono, monospace" font-size="10" fill="#3ECF8E">  ✓ PR #42 created</text>
    <text x="28" y="220" font-family="JetBrains Mono, monospace" font-size="11" fill="#F97316">❯ _</text>
    
    <!-- Evidence badges -->
    <g transform="translate(15, 275)">
      <rect x="0" y="0" width="70" height="24" rx="5" fill="#3ECF8E" opacity="0.12" stroke="#3ECF8E" stroke-width="0.5"/>
      <text x="35" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#3ECF8E" text-anchor="middle">✓ Tests</text>
      
      <rect x="78" y="0" width="65" height="24" rx="5" fill="#3B82F6" opacity="0.12" stroke="#3B82F6" stroke-width="0.5"/>
      <text x="110" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#3B82F6" text-anchor="middle">PR #42</text>
      
      <rect x="151" y="0" width="80" height="24" rx="5" fill="#F97316" opacity="0.12" stroke="#F97316" stroke-width="0.5"/>
      <text x="191" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#F97316" text-anchor="middle">Diff: 3 files</text>
    </g>
  </g>
  
  <!-- Bottom label -->
  <text x="600" y="435" font-family="Inter, sans-serif" font-size="13" fill="#52525B" text-anchor="middle">Everything stays in context: tasks, code, conversations, and evidence.</text>
</svg>
