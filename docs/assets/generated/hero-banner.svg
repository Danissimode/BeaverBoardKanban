<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="50%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="350" cy="300" rx="250" ry="200" fill="url(#glow)" filter="url(#blur)"/>
  
  <!-- Grid -->
  <g opacity="0.04" stroke="#F97316" stroke-width="0.5" fill="none">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Beaver mascot -->
  <g transform="translate(120, 90) scale(1.1)">
    <!-- Hard hat -->
    <ellipse cx="130" cy="75" rx="80" ry="28" fill="#F97316"/>
    <path d="M60 75 Q65 20 130 10 Q195 20 200 75" fill="#F97316"/>
    <rect x="48" y="70" width="164" height="14" rx="7" fill="#EA580C"/>
    <rect x="55" y="62" width="150" height="6" rx="3" fill="#F59E0B" opacity="0.6"/>
    
    <!-- Head -->
    <ellipse cx="130" cy="135" rx="70" ry="60" fill="#8B4513"/>
    <ellipse cx="130" cy="130" rx="58" ry="48" fill="#A0522D"/>
    
    <!-- Ears -->
    <ellipse cx="65" cy="95" rx="18" ry="22" fill="#8B4513"/>
    <ellipse cx="65" cy="95" rx="12" ry="15" fill="#CD853F"/>
    <ellipse cx="195" cy="95" rx="18" ry="22" fill="#8B4513"/>
    <ellipse cx="195" cy="95" rx="12" ry="15" fill="#CD853F"/>
    
    <!-- Eyes -->
    <ellipse cx="105" cy="118" rx="12" ry="14" fill="white"/>
    <ellipse cx="155" cy="118" rx="12" ry="14" fill="white"/>
    <circle cx="108" cy="120" r="7" fill="#1a1a1a"/>
    <circle cx="158" cy="120" r="7" fill="#1a1a1a"/>
    <circle cx="110" cy="117" r="2.5" fill="white"/>
    <circle cx="160" cy="117" r="2.5" fill="white"/>
    
    <!-- Nose -->
    <ellipse cx="130" cy="140" rx="12" ry="8" fill="#5D3A1A"/>
    <ellipse cx="130" cy="138" rx="4" ry="2" fill="#8B6914" opacity="0.5"/>
    
    <!-- Mouth & Teeth -->
    <path d="M118 148 Q130 158 142 148" stroke="#5D3A1A" stroke-width="2" fill="none"/>
    <rect x="122" y="148" width="8" height="14" rx="2" fill="white"/>
    <rect x="132" y="148" width="8" height="14" rx="2" fill="white"/>
    
    <!-- Cheeks -->
    <ellipse cx="85" cy="138" rx="14" ry="10" fill="#CD853F" opacity="0.4"/>
    <ellipse cx="175" cy="138" rx="14" ry="10" fill="#CD853F" opacity="0.4"/>
    
    <!-- Body -->
    <ellipse cx="130" cy="240" rx="75" ry="65" fill="#8B4513"/>
    <ellipse cx="130" cy="235" rx="60" ry="50" fill="#A0522D"/>
    
    <!-- Orange vest -->
    <path d="M80 195 L68 270 L192 270 L180 195 Z" fill="#F97316" opacity="0.9"/>
    <line x1="130" y1="195" x2="130" y2="270" stroke="#EA580C" stroke-width="3"/>
    <rect x="88" y="210" width="20" height="4" rx="2" fill="#F59E0B"/>
    <rect x="152" y="210" width="20" height="4" rx="2" fill="#F59E0B"/>
    
    <!-- Arms -->
    <ellipse cx="55" cy="230" rx="22" ry="16" fill="#8B4513"/>
    <ellipse cx="205" cy="230" rx="22" ry="16" fill="#8B4513"/>
    
    <!-- Tablet/Kanban -->
    <rect x="65" y="210" width="130" height="90" rx="10" fill="#18181B" stroke="#3F3F46" stroke-width="2"/>
    <rect x="65" y="210" width="130" height="20" rx="10" fill="#27272A"/>
    <rect x="65" y="222" width="130" height="8" fill="#27272A"/>
    <circle cx="80" cy="220" r="4" fill="#F06B6B"/>
    <circle cx="92" cy="220" r="4" fill="#F59E0B"/>
    <circle cx="104" cy="220" r="4" fill="#3ECF8E"/>
    
    <!-- Kanban columns -->
    <line x1="108" y1="238" x2="108" y2="290" stroke="#3F3F46" stroke-width="1"/>
    <line x1="152" y1="238" x2="152" y2="290" stroke="#3F3F46" stroke-width="1"/>
    
    <!-- Cards -->
    <rect x="72" y="242" width="30" height="20" rx="3" fill="#F97316"/>
    <rect x="72" y="268" width="30" height="14" rx="3" fill="#F59E0B"/>
    <rect x="115" y="245" width="30" height="16" rx="3" fill="#3B82F6"/>
    <rect x="115" y="268" width="30" height="18" rx="3" fill="#3ECF8E"/>
    <rect x="158" y="248" width="30" height="14" rx="3" fill="#F97316"/>
    <rect x="158" y="270" width="30" height="10" rx="3" fill="#A1A1AA"/>
  </g>
  
  <!-- Text -->
  <text x="520" y="200" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#FAFAFA" letter-spacing="-2">Beaver</text>
  <text x="520" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#F97316" letter-spacing="-2">Board</text>
  
  <text x="520" y="330" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#A1A1AA" font-weight="400">Agentic development board for builders</text>
  
  <text x="520" y="380" font-family="JetBrains Mono, 'IBM Plex Mono', Menlo, monospace" font-size="16" fill="#71717A">Run your AI team from one board.</text>
  
  <!-- Badges -->
  <g transform="translate(520, 410)">
    <rect x="0" y="0" width="70" height="30" rx="15" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="35" y="19" font-family="JetBrains Mono, monospace" font-size="11" fill="#3ECF8E" text-anchor="middle">MIT</text>
    
    <rect x="80" y="0" width="90" height="30" rx="15" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="125" y="19" font-family="JetBrains Mono, monospace" font-size="11" fill="#A1A1AA" text-anchor="middle">.NET 10</text>
    
    <rect x="180" y="0" width="70" height="30" rx="15" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="215" y="19" font-family="JetBrains Mono, monospace" font-size="11" fill="#3B82F6" text-anchor="middle">CI ✓</text>
  </g>
  
  <!-- Corner accents -->
  <path d="M1120 0 L1200 0 L1200 80 Z" fill="#F97316" opacity="0.08"/>
  <path d="M0 550 L0 630 L80 630 Z" fill="#F97316" opacity="0.05"/>
</svg>
