<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg5)"/>
  
  <!-- Large beaver mascot (left side) -->
  <g transform="translate(60, 60) scale(0.85)">
    <!-- Hard hat -->
    <ellipse cx="180" cy="100" rx="110" ry="38" fill="#F97316"/>
    <path d="M80 100 Q90 20 180 8 Q270 20 280 100" fill="#F97316"/>
    <rect x="65" y="92" width="230" height="18" rx="9" fill="#EA580C"/>
    
    <!-- Head -->
    <ellipse cx="180" cy="180" rx="95" ry="85" fill="#8B4513"/>
    <ellipse cx="180" cy="175" rx="78" ry="68" fill="#A0522D"/>
    
    <!-- Ears -->
    <ellipse cx="90" cy="120" rx="25" ry="30" fill="#8B4513"/>
    <ellipse cx="90" cy="120" rx="16" ry="20" fill="#CD853F"/>
    <ellipse cx="270" cy="120" rx="25" ry="30" fill="#8B4513"/>
    <ellipse cx="270" cy="120" rx="16" ry="20" fill="#CD853F"/>
    
    <!-- Eyes -->
    <ellipse cx="145" cy="158" rx="16" ry="18" fill="white"/>
    <ellipse cx="215" cy="158" rx="16" ry="18" fill="white"/>
    <circle cx="149" cy="160" r="9" fill="#1a1a1a"/>
    <circle cx="219" cy="160" r="9" fill="#1a1a1a"/>
    <circle cx="152" cy="156" r="3" fill="white"/>
    <circle cx="222" cy="156" r="3" fill="white"/>
    
    <!-- Nose -->
    <ellipse cx="180" cy="190" rx="15" ry="10" fill="#5D3A1A"/>
    
    <!-- Teeth -->
    <rect x="168" y="210" width="11" height="18" rx="3" fill="white"/>
    <rect x="181" y="210" width="11" height="18" rx="3" fill="white"/>
    
    <!-- Body -->
    <ellipse cx="180" cy="330" rx="100" ry="85" fill="#8B4513"/>
    <ellipse cx="180" cy="325" rx="82" ry="68" fill="#A0522D"/>
    
    <!-- Vest -->
    <path d="M110 265 L95 370 L265 370 L250 265 Z" fill="#F97316" opacity="0.9"/>
    <line x1="180" y1="265" x2="180" y2="370" stroke="#EA580C" stroke-width="3"/>
    
    <!-- Tablet -->
    <rect x="115" y="295" width="130" height="95" rx="10" fill="#18181B" stroke="#3F3F46" stroke-width="2"/>
    <rect x="115" y="295" width="130" height="22" rx="10" fill="#27272A"/>
    <rect x="115" y="310" width="130" height="7" fill="#27272A"/>
    <circle cx="130" cy="306" r="4" fill="#F06B6B"/>
    <circle cx="142" cy="306" r="4" fill="#F59E0B"/>
    <circle cx="154" cy="306" r="4" fill="#3ECF8E"/>
    
    <!-- Cards on tablet -->
    <line x1="158" y1="322" x2="158" y2="382" stroke="#3F3F46" stroke-width="1"/>
    <line x1="202" y1="322" x2="202" y2="382" stroke="#3F3F46" stroke-width="1"/>
    <rect x="122" y="328" width="30" height="20" rx="3" fill="#F97316"/>
    <rect x="122" y="355" width="30" height="16" rx="3" fill="#F59E0B"/>
    <rect x="165" y="330" width="30" height="18" rx="3" fill="#3B82F6"/>
    <rect x="165" y="355" width="30" height="20" rx="3" fill="#3ECF8E"/>
    <rect x="208" y="332" width="30" height="16" rx="3" fill="#F97316"/>
  </g>
  
  <!-- Text (right side) -->
  <text x="580" y="180" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="700" fill="#FAFAFA" letter-spacing="-3">Beaver</text>
  <text x="580" y="270" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="700" fill="url(#orange)" letter-spacing="-3">Board</text>
  
  <text x="580" y="340" font-family="Inter, -apple-system, sans-serif" font-size="28" fill="#A1A1AA">Agentic development board for builders</text>
  
  <!-- Tags -->
  <g transform="translate(580, 380)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="70" y="23" font-family="JetBrains Mono, monospace" font-size="12" fill="#3ECF8E" text-anchor="middle">MIT License</text>
    
    <rect x="155" y="0" width="120" height="36" rx="18" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="215" y="23" font-family="JetBrains Mono, monospace" font-size="12" fill="#A1A1AA" text-anchor="middle">.NET 10</text>
    
    <rect x="290" y="0" width="100" height="36" rx="18" fill="#27272A" stroke="#3F3F46" stroke-width="1"/>
    <text x="340" y="23" font-family="JetBrains Mono, monospace" font-size="12" fill="#3B82F6" text-anchor="middle">CI ✓</text>
  </g>
  
  <!-- URL -->
  <text x="580" y="460" font-family="JetBrains Mono, monospace" font-size="14" fill="#52525B">github.com/Danissimode/BeaverBoardKanban</text>
  
  <!-- Corner accents -->
  <path d="M1120 0 L1200 0 L1200 80 Z" fill="#F97316" opacity="0.06"/>
  <path d="M0 550 L0 630 L80 630 Z" fill="#F97316" opacity="0.04"/>
</svg>
